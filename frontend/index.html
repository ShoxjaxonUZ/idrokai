<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy — XSS himoyasi
         (frame-ancestors meta'da ishlamaydi — helmet HTTP header orqali yuboradi) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://www.googletagmanager.com https://www.google-analytics.com;
      script-src-elem 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com;
      worker-src 'self' blob:;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: http://localhost:5000 https:;
      media-src 'self' blob: http://localhost:5000 https://*.onrender.com https:;
      connect-src 'self' http://localhost:5000 ws://localhost:5173 wss://localhost:5173 https://*.onrender.com https://api.groq.com https://www.google-analytics.com https://*.google-analytics.com https://stats.g.doubleclick.net;
      base-uri 'self';
      object-src 'none';
      form-action 'self';
    " />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Primary SEO -->
    <title>IdrokAI — O'zbek tilida bepul ta'lim platformasi</title>
    <meta name="description" content="IdrokAI — O'zbek tilida bepul online ta'lim platformasi. Dasturlash, matematika, ingliz tili, dizayn va boshqa kurslarni o'rganing. Sertifikat oling!" />
    <meta name="keywords" content="idrokai, o'zbek tilida kurslar, bepul ta'lim, dasturlash kurslari, online ta'lim o'zbekiston, python, javascript, matematika" />
    <meta name="author" content="IdrokAI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://idrokai.uz" />

    <!-- Open Graph (Facebook, Telegram) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://idrokai.uz" />
    <meta property="og:title" content="IdrokAI — O'zbek tilida bepul ta'lim" />
    <meta property="og:description" content="Dasturlash, matematika, ingliz tili va dizayn kurslarini bepul o'rganing. Sertifikat oling!" />
    <meta property="og:image" content="https://idrokai.uz/og-image.png" />
    <meta property="og:locale" content="uz_UZ" />
    <meta property="og:site_name" content="IdrokAI" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IdrokAI — O'zbek tilida bepul ta'lim" />
    <meta name="twitter:description" content="Dasturlash, matematika, ingliz tili va dizayn kurslarini bepul o'rganing!" />
    <meta name="twitter:image" content="https://idrokai.uz/og-image.png" />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Theme color -->
    <meta name="theme-color" content="#7c3aed" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZXJV41SWK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KZXJV41SWK');
    </script>
    <!-- Theme — React yuklangunga qadar to'g'ri rangni o'rnatish (FOUC oldini olish) -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
